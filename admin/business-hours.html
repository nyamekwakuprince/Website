<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Business Hours — Admin | Lara LuxeStudio</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="../assets/images/logo.png" type="image/png" />
  <style>
    body { background:#f9f9f9; }
    .admin-container { max-width:1100px; margin:80px auto; padding:0 20px; }
    .card { background:#fff; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.06); padding:24px; }
    .section-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .field-row { display:grid; grid-template-columns:1fr 160px 160px 120px; gap:14px; align-items:end; margin-bottom:14px; }
    .field-row > * { min-width:0; }
    .field-row label { display:block; font-size:13px; color:#555; margin-bottom:6px; }
    .field-row input, .field-row select { width:100%; padding:12px 14px; border-radius:12px; border:1px solid #e8e2f0; }
    button.btn-primary { background:var(--purple); border:none; color:#fff; border-radius:12px; padding:11px 18px; cursor:pointer; }
    button.btn-ghost { border:1px solid #ddd; background:#fff; color:#333; border-radius:12px; padding:10px 16px; cursor:pointer; }
    .table-responsive { overflow-x:auto; }
    table.admin-table { width:100%; border-collapse:collapse; }
    table.admin-table th, table.admin-table td { padding:14px 12px; border-bottom:1px solid #f1edf6; }
    table.admin-table th { background:#faf3ff; color:#333; font-weight:600; }
    .status-toggle { display:flex; align-items:center; gap:10px; }
    .status-toggle input { transform:scale(1.1); }
    @media (max-width: 860px) {
      .field-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar theme-dark" id="navbar" role="navigation">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="../index.html" style="display:flex;align-items:center;gap:10px;">
          <img src="../assets/images/logo.png" alt="logo" class="logo-img" />
          <div class="logo-text"><span class="logo-name">LARA</span><span class="logo-studio">LUXESTUDIO</span></div>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </div>
  </nav>

  <main class="admin-container">
    <div class="card">
      <div class="section-title">
        <div>
          <h2>Business Hours</h2>
          <p style="margin:4px 0 0;color:#666;">Edit opening hours for each day and toggle open/closed states.</p>
        </div>
        <a href="index.html" class="btn-ghost">Back to Dashboard</a>
      </div>

      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Day</th>
              <th>Open / Closed</th>
              <th>Opening Time</th>
              <th>Closing Time</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="hoursTableBody">
            <tr><td colspan="5" style="text-align:center;padding:24px;color:#888;">Loading business hours…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script type="module" src="src/admin-business-hours.ts"></script>
</body>
</html>
