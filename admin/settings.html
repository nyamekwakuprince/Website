<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Booking Settings — Admin | Lara LuxeStudio</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="../assets/images/logo.png" type="image/png" />
  <style>
    body { background:#f9f9f9; }
    .admin-container { max-width:980px; margin:80px auto; padding:0 20px; }
    .card { background:#fff; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.06); padding:28px; }
    .section-title { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:16px; margin-bottom:20px; }
    .section-title h2 { margin:0; }
    .section-description { margin:6px 0 0; color:#666; max-width:720px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .field { display:flex; flex-direction:column; gap:8px; }
    .field label { font-size:13px; color:#444; }
    .field input, .field textarea { width:100%; padding:14px 16px; border-radius:12px; border:1px solid #e8e2f0; background:#fafafa; font-size:14px; }
    .field textarea { min-height:120px; resize:vertical; }
    .field.small input { width:100%; }
    .field.full-width { grid-column:1 / -1; }
    .toolbar { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .btn-primary { background:var(--purple); border:none; color:#fff; border-radius:12px; padding:12px 18px; cursor:pointer; font-size:14px; }
    .btn-ghost { border:1px solid #ddd; background:#fff; color:#333; border-radius:12px; padding:12px 18px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .message { margin-top:18px; padding:14px 16px; border-radius:12px; font-size:14px; }
    .message.error { background:#fde7e9; color:#8d1d24; border:1px solid #f4c2c8; }
    .message.success { background:#e9f6eb; color:#276835; border:1px solid #b9dfc0; }
    @media (max-width: 820px) {
      .form-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar theme-dark" id="navbar" role="navigation">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="../index.html" style="display:flex;align-items:center;gap:10px;">
          <img src="../assets/images/logo.png" alt="logo" class="logo-img" />
          <div class="logo-text"><span class="logo-name">LARA</span><span class="logo-studio">LUXESTUDIO</span></div>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="business-hours.html">Business Hours</a></li>
        <li><a href="blocked-dates.html">Blocked Dates</a></li>
      </ul>
    </div>
  </nav>

  <main class="admin-container">
    <div class="card">
      <div class="section-title">
        <div>
          <h2>Booking Settings</h2>
          <p class="section-description">Manage studio contact details and booking lead time, so the booking form reflects your current availability rules.</p>
        </div>
        <div class="toolbar">
          <a href="index.html" class="btn-ghost">Back to Dashboard</a>
        </div>
      </div>

      <form id="settingsForm">
        <div class="form-grid">
          <div class="field full-width">
            <label for="businessName">Business Name</label>
            <input type="text" id="businessName" name="businessName" placeholder="Lara LuxeStudio" />
          </div>

          <div class="field">
            <label for="businessPhone">Phone Number</label>
            <input type="tel" id="businessPhone" name="businessPhone" placeholder="+233 59 569 9259" />
          </div>

          <div class="field">
            <label for="businessEmail">Email Address</label>
            <input type="email" id="businessEmail" name="businessEmail" placeholder="bookings@laraluxe.studio" />
          </div>

          <div class="field full-width">
            <label for="businessAddress">Business Address</label>
            <textarea id="businessAddress" name="businessAddress" placeholder="Kisseman - Westland, Accra"></textarea>
          </div>

          <div class="field small">
            <label for="slotInterval">Slot Interval (minutes)</label>
            <input type="number" id="slotInterval" name="slotInterval" min="5" step="5" placeholder="30" />
          </div>

          <div class="field small">
            <label for="bookingNoticeHours">Booking Notice (hours)</label>
            <input type="number" id="bookingNoticeHours" name="bookingNoticeHours" min="0" step="1" placeholder="24" />
          </div>
        </div>

        <div style="margin-top:22px; display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
          <button type="submit" class="btn-primary">Save Settings</button>
          <span id="saveStatus" class="message" style="display:none"></span>
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="src/admin-settings.ts"></script>
</body>
</html>
