<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Service Management — Admin | Lara LuxeStudio</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="../assets/images/logo.png" type="image/png" />
  <style>
    body { background:#f9f9f9; }
    .admin-container { max-width:1200px; margin:80px auto; padding:0 20px; }
    .card { background:white; padding:20px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.04); }
    .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
    .btn-primary { background:var(--purple); color:white; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; }
    .btn-ghost { background:transparent; border:1px solid #eaeaea; padding:8px 10px; border-radius:8px; cursor:pointer; }
    .table-responsive { overflow-x:auto; }
    table.admin-table th, table.admin-table td { padding:12px; border-bottom:1px solid #f1edf6; }
    /* Modal */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .modal { background:white; border-radius:12px; padding:20px; width:520px; max-width:92%; }
    .modal h3 { margin-top:0; }
    .form-row { display:flex; gap:10px; }
    .form-row .col { flex:1; }
    .field { margin-bottom:10px; }
    .field label { display:block; font-size:13px; margin-bottom:6px; }
    .field input, .field textarea, .field select { width:100%; padding:10px; border-radius:8px; border:1px solid #eee; }
  </style>
</head>
<body>
  <nav class="navbar theme-dark" id="navbar" role="navigation">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="../index.html" style="display:flex;align-items:center;gap:10px;">
          <img src="../assets/images/logo.png" alt="logo" class="logo-img" />
          <div class="logo-text"><span class="logo-name">LARA</span><span class="logo-studio">LUXESTUDIO</span></div>
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </div>
  </nav>

  <main class="admin-container">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 style="margin:0;">Service Management</h2>
        <div class="toolbar">
          <button id="addServiceBtn" class="btn-primary">Add Service</button>
          <a href="index.html" class="btn-ghost">Back to Dashboard</a>
        </div>
      </div>

      <div class="table-responsive">
        <table class="admin-table" style="width:100%;border-collapse:collapse;">
          <thead>
            <tr>
              <th>Name</th>
              <th>Description</th>
              <th>Duration</th>
              <th>Price</th>
              <th>Active</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="servicesTableBody">
            <tr><td colspan="6" style="text-align:center;padding:20px;color:#888;">Loading services…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="serviceModal" style="display:none;">
    <div class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal" role="document">
        <h3 id="modalTitle">Add Service</h3>
        <form id="serviceForm">
          <input type="hidden" id="serviceId" />
          <div class="field">
            <label for="serviceName">Name</label>
            <input id="serviceName" required />
          </div>
          <div class="field">
            <label for="serviceDesc">Description</label>
            <textarea id="serviceDesc" rows="3"></textarea>
          </div>
          <div class="form-row">
            <div class="col field">
              <label for="serviceDuration">Duration (minutes)</label>
              <input id="serviceDuration" type="number" min="1" required />
            </div>
            <div class="col field">
              <label for="servicePrice">Price (GHS)</label>
              <input id="servicePrice" type="number" step="0.01" min="0" required />
            </div>
          </div>
          <div class="field">
            <label for="serviceActive">Active</label>
            <select id="serviceActive"><option value="true">Active</option><option value="false">Inactive</option></select>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
            <button type="button" id="cancelService" class="btn-ghost">Cancel</button>
            <button type="submit" id="saveService" class="btn-primary">Save Service</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="src/admin-services.ts"></script>
</body>
</html>
