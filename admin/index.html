<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Lara LuxeStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="icon" href="../assets/images/logo.png" type="image/png" />
  <style>
    /* Specific styles for Admin Dashboard */
    body { background-color: #f9f9f9; }
    .admin-container {
      max-width: 1200px;
      margin: 100px auto 50px auto;
      padding: 0 20px;
    }
    /* Login Section */
    #adminLoginSection {
      max-width: 400px;
      margin: 50px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
    }
    #adminLoginSection h2 { font-family: 'Playfair Display', serif; color: var(--primary-color); margin-bottom: 20px;}
    .login-input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
    }
    .login-error { color: #d9534f; font-size: 14px; margin-bottom: 10px; display: none; }
    /* Dashboard Section */
    #adminDashboardSection {
      display: none; /* hidden until logged in */
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid #eee;
      padding-bottom: 15px;
    }
    .dashboard-header h2 { font-family: 'Playfair Display', serif; color: var(--primary-color); }
    /* Table Styles */
    .table-responsive { overflow-x: auto; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }
    .admin-table th, .admin-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .admin-table th {
      background-color: #fcf6fc;
      color: #333;
      font-weight: 600;
    }
    .admin-table tbody tr:hover { background-color: #f9f9f9; }
    .badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    .btn-logout {
      background-color: #f5f5f5;
      color: #333;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.3s;
    }
    .btn-logout:hover { background-color: #e0e0e0; }
  </style>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav class="navbar theme-dark" id="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="../index.html" style="display: flex; align-items: center; gap: 10px;">
          <img src="../assets/images/logo.png" alt="Lara LuxeStudio Logo" class="logo-img" />
          <div class="logo-text">
            <span class="logo-name">LARA</span>
            <span class="logo-studio">LUXESTUDIO</span>
          </div>
        </a>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="../index.html" class="nav-link">Home</a></li>
      </ul>
    </div>
  </nav>

  <div class="admin-container">
    
    <!-- Login Form -->
    <div id="adminLoginSection">
      <h2>Admin Login</h2>
      <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Please enter your credentials to access the dashboard.</p>
      <form id="adminLoginForm">
        <div id="loginError" class="login-error">Invalid username or password.</div>
        <input type="text" id="adminUsername" class="login-input" placeholder="Username" required />
        <input type="password" id="adminPassword" class="login-input" placeholder="Password" required />
        <button type="submit" class="btn-primary" style="width: 100%; border-radius: 8px;">Login to Dashboard</button>
      </form>
    </div>

    <!-- Dashboard -->
    <div id="adminDashboardSection">
      <div class="dashboard-header">
        <h2>Booked Sessions</h2>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
      
      <div class="table-responsive">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Customer</th>
              <th>Service</th>
              <th>Contact Info</th>
              <th>Status</th>
              <th>Booked On</th>
            </tr>
          </thead>
          <tbody id="bookingsTableBody">
            <tr><td colspan="7" style="text-align: center;">Loading bookings...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
